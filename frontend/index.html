<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TI AI Chat Hub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="top-actions">
        <div id="userInfo" aria-live="polite"></div>
        <button id="signOutBtn" type="button">Sign out</button>
      </div>

      <header class="header">
        <h1>TI AI Chat Hub</h1>

        <div class="controls">
          <div class="model-selector">
            <button id="modelToggleBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span id="modelDescription">Model</span>
              <span id="modelName"></span>
            </button>
            <div id="modelMenu" role="listbox" hidden></div>
            <select id="model" hidden></select>
          </div>

          <button id="clearHistoryBtn" type="button">Clear chat</button>
        </div>
      </header>

      <div class="chat-shell">
        <div id="robotAvatar" class="robot-avatar" aria-hidden="true">
          <svg viewBox="0 0 160 200" class="robot-svg" focusable="false">
            <ellipse class="robot-shadow" cx="80" cy="188" rx="44" ry="10" />
            <rect class="robot-body" x="44" y="108" width="72" height="74" rx="18" />
            <rect class="robot-neck" x="70" y="98" width="20" height="14" rx="6" />
            <g class="robot-head-group">
              <rect class="robot-head" x="28" y="24" width="104" height="84" rx="20" />
              <circle class="robot-eye" cx="62" cy="62" r="8" />
              <circle class="robot-eye" cx="98" cy="62" r="8" />
              <rect class="robot-mouth" x="60" y="80" width="40" height="8" rx="4" />
              <rect class="robot-antenna" x="76" y="10" width="8" height="18" rx="4" />
              <circle class="robot-antenna-tip" cx="80" cy="8" r="5" />
            </g>
          </svg>
        </div>

        <section id="chat" aria-live="polite"></section>
      </div>

      <div class="chat-actions">
        <button id="attachDocBtn" type="button">Attach document</button>
        <button id="readDocBtn" type="button" hidden>Attach image file</button>
        <input id="docFileInput" type="file" accept=".pdf,.docx,.txt,.md" hidden />
        <input id="imageToTextFileInput" type="file" hidden />
        <div id="docStatus"></div>
      </div>

      <form id="promptForm">
        <textarea id="prompt" placeholder="Type your message..." required></textarea>
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
